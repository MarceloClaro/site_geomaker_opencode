<?xml version="1.0" encoding="UTF-8"?>
<svg xmlns="http://www.w3.org/2000/svg"
     width="210mm" height="297mm"
     viewBox="0 0 744 1052">
  <defs>
    <linearGradient id="elevGrad" x1="0" y1="0" x2="1" y2="0">
      <stop offset="0%"   stop-color="#3a6b4a" />
      <stop offset="25%"  stop-color="#6a9e5a" />
      <stop offset="50%"  stop-color="#c49a4a" />
      <stop offset="75%"  stop-color="#a06e3e" />
      <stop offset="100%" stop-color="#5e341e" />
    </linearGradient>
    <style>
      /* === Tema visual — Relevo em Papel 3D v3 (multi-page) === */
      .slice-group { stroke-linejoin: round; }
      .slot-v { stroke: #c0392b; stroke-width: 1.4; stroke-dasharray: 3,2; stroke-linecap: round; }
      .slot-h { stroke: #2980b9; stroke-width: 1.4; stroke-dasharray: 3,2; stroke-linecap: round; }
      .contour { stroke: rgba(0,0,0,0.09); stroke-width: 0.6; stroke-dasharray: 2,3; stroke-linecap: round; }
      .label { font-family: "Segoe UI", Arial, sans-serif; font-size: 5.8px; fill: #333; }
      .label-bold { font-family: "Segoe UI", Arial, sans-serif; font-size: 8px; font-weight: 700; fill: #1a252f; }
      .title-lg { font-family: "Segoe UI", Arial, sans-serif; font-size: 13px; font-weight: 800; fill: #1a252f; }
      .instr { font-family: "Segoe UI", Arial, sans-serif; font-size: 5.8px; fill: #444; }
      .instr-bold { font-family: "Segoe UI", Arial, sans-serif; font-size: 6.8px; font-weight: bold; fill: #1a252f; }
      .reg-mark { stroke: #888; stroke-width: 0.6; stroke-linecap: round; }
      .bleed-guide { fill: none; stroke: rgba(200,0,0,0.15); stroke-width: 0.4; stroke-dasharray: 4,4; }
      .page-num { font-family: "Segoe UI", Arial, sans-serif; font-size: 6px; fill: #999; }
      .scale-bar { font-family: "Segoe UI", Arial, sans-serif; }
      .color-bar { font-family: "Segoe UI", Arial, sans-serif; }
      .align-mark { stroke: #e67e22; stroke-width: 0.8; stroke-dasharray: 2,2; stroke-linecap: round; }
      .fold-line { stroke: #e74c3c; stroke-width: 1; stroke-dasharray: 5,3; }
      .fold-label { font-family: "Segoe UI", Arial, sans-serif; font-size: 7px; fill: #1a252f; text-anchor: middle; dominant-baseline: central; }
    </style>
  </defs>

  <!-- Guia de sangria fina -->
  <rect x="16.5" y="16.5" width="711" height="1019" fill="none" stroke="rgba(200,0,0,0.08)" stroke-width="0.3" stroke-dasharray="3,5" rx="2" />

  <!-- Conteudo gerado -->
  <g id="model-content">
    POLYLINES_HERE
  </g>

  <!-- Rodape -->
  <g font-family="Segoe UI, Arial, sans-serif">
    <line x1="28" y1="1030" x2="716" y2="1030" stroke="#ddd" stroke-width="0.5" />
    <text x="28" y="1043" class="watermark">Gerado por Geomaker · Dados: Open-Meteo (elevação) + OpenStreetMap (geocodificação)</text>
  </g>
</svg>
