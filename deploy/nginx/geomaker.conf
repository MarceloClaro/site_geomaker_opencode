server {
    listen 8080 default_server;
    listen [::]:8080 default_server;
    server_name _;
    charset utf-8;

    # TouchTerrain proxy (^~ para prioridade sobre regex)
    location ^~ /main {
        proxy_pass http://localhost:8081/main;
        proxy_set_header Host $http_host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
        proxy_read_timeout 600;
    }

    location ^~ /export {
        proxy_pass http://localhost:8081/export;
        proxy_set_header Host $http_host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
        proxy_read_timeout 600;
        client_max_body_size 100M;
    }

    location ^~ /preview/ {
        proxy_pass http://localhost:8081/preview/;
        proxy_set_header Host $http_host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
        proxy_read_timeout 600;
    }

    location ^~ /download/ {
        proxy_pass http://localhost:8081/download/;
        proxy_set_header Host $http_host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
        proxy_read_timeout 600;
    }

    location ^~ /static/ {
        proxy_pass http://localhost:8081/static/;
        proxy_set_header Host $http_host;
        proxy_read_timeout 600;
    }

    location ^~ /touchterrain/ {
        proxy_pass http://localhost:8081/;
        proxy_set_header Host $http_host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
        proxy_read_timeout 600;
    }

    location = / {
        proxy_pass http://localhost:8081/;
        proxy_set_header Host $http_host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
        proxy_read_timeout 600;
    }

    location ^~ /api/ {
        proxy_pass http://127.0.0.1:8082;
        proxy_set_header Host $http_host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
        proxy_read_timeout 600;
        proxy_http_version 1.1;
        # Essencial para SSE (/api/terminal): sem isso o Nginx pode reter
        # os bytes em buffer, atrasando o keep-alive e levando a timeout
        # 524 no túnel Cloudflare mesmo com o servidor ainda processando.
        proxy_buffering off;
        proxy_cache off;
        chunked_transfer_encoding off;
    }

    # Site estático
    root /opt/geomaker/site;
    index index.html;

    location / {
        try_files $uri $uri/ =404;
    }

    location ~* \.(?:css|js|jpg|jpeg|png|gif|svg|webp|ico|json|glb|stl|obj)$ {
        expires 7d;
        add_header Cache-Control "public, max-age=604800";
        try_files $uri =404;
    }

    add_header X-Content-Type-Options nosniff always;
    add_header Referrer-Policy strict-origin-when-cross-origin always;
}
