<!DOCTYPE html>
<html lang="pt-BR">
<head>
  <meta charset="utf-8"><meta name="viewport" content="width=device-width, initial-scale=1">
  <meta name="description" content="Gerador de modelos topográficos para impressão 3D — TouchTerrain integrado ao WSL.">
  <meta name="theme-color" content="#173f3a"><title>TouchTerrain — Geomaker</title>
  <link rel="icon" href="assets/logo.png" type="image/png"><link rel="stylesheet" href="assets/styles.css">
  <script defer src="assets/config.js"></script><script defer src="assets/data.js"></script><script defer src="assets/tainacan.js"></script><script defer src="assets/site.js"></script>
  <style>
    html, body { height: 100%; overflow: hidden; }
    body { display: flex; flex-direction: column; }
    [data-site-header] { flex-shrink: 0; }
    #conteudo { flex: 1; display: flex; flex-direction: column; }
    .touchterrain-full { flex: 1; display: flex; flex-direction: column; }
    .touchterrain-full iframe { flex: 1; width: 100%; border: none; }
    .touchterrain-toolbar { display: flex; align-items: center; gap: 1rem; padding: 0.5rem 1.5rem; background: var(--surface-2); border-bottom: 1px solid var(--border); font-size: 0.875rem; flex-shrink: 0; }
    .touchterrain-toolbar a { color: var(--text-2); text-decoration: none; }
    .touchterrain-toolbar a:hover { color: var(--accent); }
    .touchterrain-toolbar .badge { padding: 0.15rem 0.5rem; border-radius: 4px; background: var(--accent); color: #fff; font-size: 0.7rem; font-weight: 600; text-transform: uppercase; letter-spacing: 0.05em; }
  </style>
</head>
<body data-page="touchterrain">
  <div data-site-header></div>
  <main id="conteudo">
    <div class="touchterrain-full">
      <div class="touchterrain-toolbar">
        <span class="badge">WSL · local</span>
        <span>TouchTerrain 3.6 — gerador de relevo para impressão 3D</span>
        <span style="flex:1"></span>
        <a href="/touchterrain/" target="_blank" rel="noopener noreferrer">Abrir em nova aba ↗</a>
        <a href="laboratorio.html#relevo-3d">← Laboratório</a>
      </div>
      <iframe title="TouchTerrain — gerador de modelos topográficos para impressão 3D" src="/main" loading="lazy" allow="fullscreen" referrerpolicy="strict-origin-when-cross-origin"></iframe>
    </div>
  </main>
  <div data-site-footer style="display:none"></div>
  <div data-site-search></div>
</body>
</html>
